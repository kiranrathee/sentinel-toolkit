#!/usr/bin/env bash
# ============================================================
# server.conf — Single source of truth for Sentinel Toolkit.
# Every module reads its values from here. Change settings
# ONLY in this file — never hardcode paths inside the modules.
# ============================================================

# Auto-detected root of the toolkit (do not edit)
SENTINEL_HOME="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

# ---------- Logging ----------
LOG_DIR="/var/log/sentinel"
USE_SYSLOG=true          # also mirror alerts to system log via `logger`

# ---------- Backup module ----------
BACKUP_SRC="/home"                  # folder to back up
BACKUP_DEST="/var/backups/sentinel" # where archives are stored
BACKUP_KEEP_DAYS=7                  # retention window

# ---------- Log cleanup module ----------
LOGCLEAN_DIR="/var/log"
LOGCLEAN_KEEP_DAYS=14
LOGCLEAN_PATTERN="*.log"

# ---------- Service watchdog module ----------
# Bash array — add/remove services here
WATCH_SERVICES=("ssh" "cron")
AUTO_RESTART=true         # restart a dead service automatically

# ---------- Disk usage module ----------
DISK_MOUNT="/"
DISK_WARN_PCT=80           # block-usage alert threshold
INODE_WARN_PCT=85          # inode-usage alert threshold (extra check)
